<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VEMMiNA Provisionssystem</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; background: #f6f8fb; color: #1f2937; }
    h1 { margin: 0; font-size: 28px; }
    .app-header { display:flex; align-items:center; gap:14px; margin-bottom: 14px; background: linear-gradient(120deg, #ffffff, #eef6ff); border: 1px solid #dbeafe; border-radius: 12px; padding: 12px 14px; }

    .app-subtitle { margin: 2px 0 0; color: #4b5563; font-size: 13px; }
    .tabs { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
    .tab { border: 1px solid #93c5fd; border-radius: 8px; padding: 10px 14px; background: #dbeafe; color: #1e3a8a; font-weight: 600; cursor: pointer; transition: all .15s ease; }
    .tab:hover { background: #bfdbfe; }
    .tab.active { background: #2563eb; color: white; border-color: #2563eb; box-shadow: 0 2px 8px rgba(37,99,235,.35); }
    .panel { display: none; border: 1px solid #d1d5db; border-radius: 10px; background: white; padding: 16px; }
    .panel.active { display: block; }
    .status { margin: 12px 0; color: #374151; }
    .toolbar { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin: 10px 0; }
    .settings { margin: 12px 0; padding: 12px; border: 1px solid #e5e7eb; border-radius: 8px; background: #f9fafb; }
    .settings-grid { display:grid; grid-template-columns: repeat(auto-fit,minmax(520px,1fr)); gap:12px; }
    .settings-group { border:1px solid #dbe3ef; border-radius:10px; background:#fff; padding:12px; }
    .settings-group h3 { margin:0 0 6px; font-size:15px; color:#1e3a8a; }
    .settings-hint { color:#475569; font-size:12px; margin-top:6px; }
    input[type="text"], input[type="email"], input[type="number"], select { min-width: 420px; padding: 8px; border: 1px solid #cbd5e1; border-radius: 6px; }
    button { background: #10b981; color: white; border: none; border-radius: 6px; padding: 10px 14px; cursor: pointer; }
    button.secondary { background: #3b82f6; }
    button.danger { background: #ef4444; }
    button:disabled { background: #9ca3af; cursor: not-allowed; }
    table { width: 100%; border-collapse: collapse; margin-top: 12px; }
    th, td { border: 1px solid #e5e7eb; padding: 8px; text-align: left; font-size: 14px; }
    th { background: #f3f4f6; cursor: pointer; user-select: none; }
    th.sort-active { background: #dbeafe; }
    .files { margin-top: 8px; font-size: 13px; color: #1f2937; }
    .pill-list { display:flex; flex-wrap:wrap; gap:8px; margin: 8px 0; }
    .pill { display:inline-flex; align-items:center; gap:6px; background:#eef2ff; color:#1f2937; border:1px solid #c7d2fe; border-radius:999px; padding:6px 10px; font-size:12px; }
    .pill button { padding:2px 8px; font-size:12px; background:#ef4444; }
    .warning-banner { margin: 10px 0; padding: 10px 12px; border: 1px solid #fecaca; background: #fee2e2; color: #991b1b; border-radius: 8px; font-weight: 600; }
    .recipient-advisor-label { color: #b91c1c; font-weight: 700; }
    tr.row-warning td { background: #fef2f2; }
    .app-version { position: fixed; top: 12px; right: 16px; background: #111827; color: #fff; padding: 6px 10px; border-radius: 6px; font-size: 12px; z-index: 1000; cursor: pointer; }
    .version-popup { position: fixed; top: 42px; right: 16px; width: 460px; max-height: 360px; overflow: auto; background: #ffffff; border: 1px solid #d1d5db; border-radius: 8px; box-shadow: 0 8px 30px rgba(0,0,0,0.18); z-index: 1001; padding: 8px; }

    .version-popup ul { margin: 0; padding-left: 18px; }

    .table-filter-actions { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:8px; }

    .email-editor { min-height:260px; border:1px solid #cbd5e1; border-radius:8px; padding:10px; background:#fff; overflow:auto; }
    .email-editor:focus { outline:2px solid #93c5fd; outline-offset:0; }
    .email-editor-source { width:100%; min-height:260px; border:1px solid #cbd5e1; border-radius:8px; padding:10px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size:12px; }

    .email-designer-tabs { display:flex; gap:8px; margin:12px 0; }
    .email-designer-tab { border:1px solid #93c5fd; border-radius:8px; padding:8px 12px; background:#dbeafe; color:#1e3a8a; font-weight:600; cursor:pointer; }
    .email-designer-tab.active { background:#2563eb; color:#fff; border-color:#2563eb; }
    .email-designer-panel { display:none; }
    .email-designer-panel.active { display:block; }
    .empty-table-hidden { display:none; }
    .validation-empty-cell { background:#fef2f2; }
    .count-hover { text-decoration: underline dotted; cursor: help; }

  </style>
</head>
<body>
  <div class="app-header">
    <img class="app-logo" src="https://cdn.shopify.com/s/files/1/0791/6748/8345/files/grau2.png" alt="VEMMiNA Logo" />
    <div>
      <h1>VEMMiNA Provisionssystem</h1>
      <p class="app-subtitle">Rechnungsservice und Auswertungen für GoAffPro-Zahlungen.</p>
    </div>
  </div>
  <div id="appVersion" class="app-version" title="Klicken für Versionshistorie">Version: lädt…</div>
  <div id="versionHistoryPopup" class="version-popup" style="display:none">
    <div class="version-popup-header">Letzte Versionen</div>
    <ul id="versionHistoryList"></ul>
  </div>

  <div id="tabs" class="tabs"></div>
  <div id="panels"></div>

  <script>
    const API_BASE = "http://localhost:8080";
    const tableState = { rows: [], selected: new Set(), sortBy: 'paymentId', sortDirection: 'desc', filter: '' };
    let pollIntervalId = null;
    let settingsSnapshot = null;
    let advisorHoverCardEl = null;
    let validationRowsCache = [];
    let validationTreeRowsCache = [];
    let validationTreeChildrenByParent = new Map();
    let validationTreeById = new Map();
    let validationTreeExpanded = new Set();
    const tableInteractionState = new WeakMap();
    let tableFilterMenuEl = null;
    let defaultEmailTemplateHtml = '';
    let emailTemplateHtmlMode = false;
    let emailPreviewAdvisors = [];

    async function apiGet(path) {
      const response = await fetch(`${API_BASE}${path}`);
      const json = await response.json();
      if (!response.ok) throw new Error(json.error || 'API-Fehler');
      return json;
    }

    async function apiPost(path, payload) {
      const response = await fetch(`${API_BASE}${path}`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
      });
      const json = await response.json();
      if (!response.ok) throw new Error(json.error || 'API-Fehler');
      return json;
    }

    async function fetchExecutables() { return apiGet('/api/executables'); }

    async function loadVersion() {
      const box = document.getElementById('appVersion');
      if (!box) return;
      try {
        const data = await apiGet('/api/version');
        box.textContent = `Version: ${data.version || 'dev'}`;
      } catch (_) {
        box.textContent = 'Version: dev';
      }
    }


    async function loadVersionHistory() {
      const popup = document.getElementById('versionHistoryPopup');
      const list = document.getElementById('versionHistoryList');
      if (!popup || !list) return;
      try {
        const data = await apiGet('/api/version/history');
        const versions = Array.isArray(data.versions) ? data.versions : [];
        list.innerHTML = versions.map(v =>
          `<li><strong>${v.version || 'n/a'}</strong> <em>(${v.timestamp || ''})</em><br>${v.summary || ''}</li>`
        ).join('');
      } catch (e) {
        list.innerHTML = '<li>Versionshistorie konnte nicht geladen werden.</li>';
      }
    }

    function wireVersionPopup() {
      const badge = document.getElementById('appVersion');
      const popup = document.getElementById('versionHistoryPopup');
      if (!badge || !popup) return;

      badge.addEventListener('click', async (e) => {
        e.stopPropagation();
        const show = popup.style.display === 'none';
        popup.style.display = show ? 'block' : 'none';
        if (show) {
          await loadVersionHistory();
        }
      });

      document.addEventListener('click', (e) => {
        if (!popup.contains(e.target) && e.target !== badge) {
          popup.style.display = 'none';
        }
      });
    }

    function rebuildValidationTreeIndex() {
      validationTreeById = new Map();
      validationTreeChildrenByParent = new Map();
      validationTreeRowsCache.forEach(row => {
        const id = String(row.id || '').trim();
        if (!id) return;
        validationTreeById.set(id, row);
        const parentId = String(row.parentId || '').trim();
        if (!validationTreeChildrenByParent.has(parentId)) validationTreeChildrenByParent.set(parentId, []);
        validationTreeChildrenByParent.get(parentId).push(id);
      });
    }

    function validationTreeRootIds() {
      const roots = [];
      validationTreeRowsCache.forEach(row => {
        const id = String(row.id || '').trim();
        const parentId = String(row.parentId || '').trim();
        if (!id) return;
        if (!parentId || !validationTreeById.has(parentId)) roots.push(id);
      });
      return [...new Set(roots)];
    }

    function renderValidationTreeTable() {
      const status = document.getElementById('validationTreeStatus');
      const body = document.getElementById('validationTreeBody');
      if (!status || !body) return;

      const rows = [];
      const roots = validationTreeRootIds();
      const appendNode = (id, level) => {
        const row = validationTreeById.get(id);
        if (!row) return;
        const children = validationTreeChildrenByParent.get(id) || [];
        const isExpanded = validationTreeExpanded.has(id);
        const indentPx = Math.max(0, level) * 18;
        const toggleBtn = children.length ? `<button type="button" class="tree-toggle" data-node-id="${escapeHtml(id)}">${isExpanded ? '▾' : '▸'}</button>` : '<span class="tree-indent" style="width:26px"></span>';
        rows.push(`<tr><td>${escapeHtml(row.id || '')}</td><td>${escapeHtml(row.parentId || '')}</td><td>${escapeHtml(row.level || '0')}</td><td class="tree-name"><span class="tree-indent" style="width:${indentPx}px"></span>${toggleBtn}${escapeHtml(row.name || '')}</td><td>${escapeHtml(row.email || '')}</td><td>${escapeHtml(row.status || '')}</td><td>${escapeHtml(row.childrenCount || String(children.length))}</td></tr>`);
        if (children.length && isExpanded) children.forEach(childId => appendNode(childId, level + 1));
      };
      roots.forEach(id => appendNode(id, 0));

      body.innerHTML = rows.join('');
      body.querySelectorAll('.tree-toggle').forEach(btn => btn.addEventListener('click', () => {
        const nodeId = String(btn.dataset.nodeId || '');
        if (!nodeId) return;
        if (validationTreeExpanded.has(nodeId)) validationTreeExpanded.delete(nodeId);
        else validationTreeExpanded.add(nodeId);
        renderValidationTreeTable();
      }));

      status.textContent = `${rows.length} sichtbare von ${validationTreeRowsCache.length} Knoten.`;
      const table = body.closest('table');
      ensureResizableColumns(table || document);
      applyTableFilterAndSort(table);
      updateEmptyTablesVisibility(document);
    }

    function getTableState(table) {
      if (!tableInteractionState.has(table)) {
        tableInteractionState.set(table, { sortCol: null, sortDirection: 'asc', filters: new Map() });
      }
      return tableInteractionState.get(table);
    }

    function cellValue(row, colIndex) {
      const cell = row && row.cells ? row.cells[colIndex] : null;
      return (cell?.textContent || '').trim();
    }

    function compareValues(a, b) {
      const na = Number.parseFloat(a.replace(',', '.'));
      const nb = Number.parseFloat(b.replace(',', '.'));
      if (!Number.isNaN(na) && !Number.isNaN(nb)) return na - nb;
      return a.localeCompare(b, 'de', { sensitivity: 'base', numeric: true });
    }

    function updateTableHeaderStates(table) {
      const state = getTableState(table);
      const headers = table.querySelectorAll('thead th');
      headers.forEach((th, idx) => {
        th.classList.toggle('sort-active', state.sortCol === idx);
        const filterSet = state.filters.get(idx);
        th.classList.toggle('filter-active', !!(filterSet && filterSet.size));
      });
    }

    function applyTableFilterAndSort(table) {
      if (!table) return;
      const tbody = table.tBodies && table.tBodies[0];
      if (!tbody) return;
      const state = getTableState(table);
      const rows = [...tbody.rows];

      rows.forEach(row => {
        let visible = true;
        state.filters.forEach((allowedValues, colIndex) => {
          if (!visible || !allowedValues || !allowedValues.size) return;
          if (!allowedValues.has(cellValue(row, colIndex))) visible = false;
        });
        row.style.display = visible ? '' : 'none';
      });

      if (state.sortCol !== null) {
        const dir = state.sortDirection === 'asc' ? 1 : -1;
        rows.sort((ra, rb) => compareValues(cellValue(ra, state.sortCol), cellValue(rb, state.sortCol)) * dir);
        rows.forEach(row => tbody.appendChild(row));
      }
      updateTableHeaderStates(table);
    }

    function closeTableFilterMenu() {
      if (tableFilterMenuEl) {
        tableFilterMenuEl.remove();
        tableFilterMenuEl = null;
      }
    }

    function openTableFilterMenu(evt, th) {
      const table = th.closest('table');
      const tbody = table?.tBodies?.[0];
      if (!table || !tbody) return;
      const colIndex = th.cellIndex;
      if (colIndex < 0) return;
      evt.preventDefault();
      closeTableFilterMenu();

      const state = getTableState(table);
      const rows = [...tbody.rows];
      const rowsAfterOtherFilters = rows.filter(row => {
        let visible = true;
        state.filters.forEach((allowedValues, idx) => {
          if (idx === colIndex || !allowedValues || !allowedValues.size || !visible) return;
          if (!allowedValues.has(cellValue(row, idx))) visible = false;
        });
        return visible;
      });
      const valueCounts = new Map();
      rowsAfterOtherFilters.forEach(row => {
        const val = cellValue(row, colIndex);
        valueCounts.set(val, (valueCounts.get(val) || 0) + 1);
      });
      const allValues = [...valueCounts.keys()].sort((a, b) => compareValues(a, b));
      const selected = state.filters.get(colIndex) || new Set(allValues);

      tableFilterMenuEl = document.createElement('div');
      tableFilterMenuEl.className = 'table-filter-menu';
      tableFilterMenuEl.innerHTML = `
        <h4>Filter: ${escapeHtml((th.textContent || '').trim())}</h4>
        <div class="table-filter-actions">
          <button type="button" data-action="all">Alle</button>
          <button type="button" data-action="none">Keine</button>
          <button type="button" data-action="clear">Filter löschen</button>
          <button type="button" data-action="apply">Anwenden</button>
        </div>
        <div class="table-filter-options">
          ${allValues.map(v => `<label><input type="checkbox" value="${encodeURIComponent(v)}" ${selected.has(v) ? 'checked' : ''}/> <span>${escapeHtml(v || '(leer)')} (${valueCounts.get(v) || 0})</span></label>`).join('')}
        </div>
      `;
      document.body.appendChild(tableFilterMenuEl);
      tableFilterMenuEl.style.left = `${Math.min(window.innerWidth - 300, evt.clientX)}px`;
      tableFilterMenuEl.style.top = `${Math.min(window.innerHeight - 440, evt.clientY)}px`;

      const setAll = (checked) => tableFilterMenuEl.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = checked);

      tableFilterMenuEl.addEventListener('click', (e) => {
        const btn = e.target.closest('button[data-action]');
        if (!btn) return;
        const action = btn.dataset.action;
        if (action === 'all') setAll(true);
        if (action === 'none') setAll(false);
        if (action === 'clear') {
          state.filters.delete(colIndex);
          applyTableFilterAndSort(table);
          closeTableFilterMenu();
          return;
        }
        if (action === 'apply') {
          const checked = [...tableFilterMenuEl.querySelectorAll('input[type="checkbox"]:checked')].map(cb => decodeURIComponent(cb.value));
          if (!checked.length || checked.length === allValues.length) state.filters.delete(colIndex);
          else state.filters.set(colIndex, new Set(checked));
          applyTableFilterAndSort(table);
          closeTableFilterMenu();
        }
      });
    }

    function prepareTableForResize(table) {
      if (!table || table.dataset.resizePrepared === '1') return;
      const headers = table.querySelectorAll('thead th');
      headers.forEach(th => {
        const w = th.getBoundingClientRect().width;
        if (w > 0) th.style.width = `${Math.round(w)}px`;
      });
      table.style.tableLayout = 'fixed';
      table.dataset.resizePrepared = '1';
    }

    function ensureResizableColumns(root = document) {
      root.querySelectorAll('table thead th').forEach(th => {
        if (th.querySelector('.col-resizer')) return;
        th.style.position = th.style.position || 'relative';
        const handle = document.createElement('span');
        handle.className = 'col-resizer';
        handle.title = 'Spaltenbreite ändern';
        th.appendChild(handle);
      });
    }

    function wireTableInteractions() {
      let activeResize = null;

      document.addEventListener('mousedown', (evt) => {
        const handle = evt.target.closest('.col-resizer');
        if (!handle) return;
        const th = handle.closest('th');
        const table = th?.closest('table');
        if (!th || !table) return;
        evt.preventDefault();
        evt.stopPropagation();
        prepareTableForResize(table);
        th.classList.add('resizing');
        activeResize = { th, startX: evt.clientX, startWidth: th.getBoundingClientRect().width };
      });

      document.addEventListener('mousemove', (evt) => {
        if (!activeResize) return;
        const delta = evt.clientX - activeResize.startX;
        const next = Math.max(70, Math.round(activeResize.startWidth + delta));
        activeResize.th.style.width = `${next}px`;
      });

      document.addEventListener('mouseup', () => {
        if (!activeResize) return;
        activeResize.th.classList.remove('resizing');
        activeResize = null;
      });

      document.addEventListener('click', (evt) => {
        const th = evt.target.closest('th');
        if (!th) {
          if (!evt.target.closest('.table-filter-menu')) closeTableFilterMenu();
          return;
        }
        if (evt.button !== 0) return;
        const table = th.closest('table');
        const tbody = table?.tBodies?.[0];
        if (!table || !tbody) return;
        if (evt.target.closest('.col-resizer')) return;
        if (th.querySelector('input,button,select') || th.dataset.nosort === 'true') return;
        if (th.cellIndex < 0) return;

        const state = getTableState(table);
        if (state.sortCol === th.cellIndex) state.sortDirection = state.sortDirection === 'asc' ? 'desc' : 'asc';
        else {
          state.sortCol = th.cellIndex;
          state.sortDirection = 'asc';
        }
        applyTableFilterAndSort(table);
      });

      document.addEventListener('contextmenu', (evt) => {
        const th = evt.target.closest('th');
        if (!th) return;
        if (th.dataset.nofilter === 'true' || th.querySelector('input,button,select')) return;
        openTableFilterMenu(evt, th);
      });

      document.addEventListener('keydown', (evt) => { if (evt.key === 'Escape') closeTableFilterMenu(); });

      const observer = new MutationObserver(() => ensureResizableColumns());
      observer.observe(document.body, { childList: true, subtree: true });
    }

    function sortCommissionsChronologically(values) {
      const list = Array.isArray(values) ? values.filter(Boolean) : [];
      const unique = [...new Set(list)];
      return unique.sort((a, b) => {
        const an = Number(a), bn = Number(b);
        if (!Number.isNaN(an) && !Number.isNaN(bn)) return an - bn;
        return a.localeCompare(b, "de", { sensitivity: "base" });
      });
    }

    function sortCommissionsNewestFirst(values) {
      return sortCommissionsChronologically(values).reverse();
    }

    async function exportSelectedInvoiceDetailsPdfs() {
      const status = document.getElementById('pollStatus');
      const filesBox = document.getElementById('exportedFiles');
      const input = document.getElementById('pdfExportPath');
      const rows = tableState.rows.filter(row => tableState.selected.has(rowKey(row)));
      const paymentIds = [...new Set(rows.map(row => row.paymentId).filter(Boolean))];

      if (paymentIds.length === 0) {
        status.textContent = 'Bitte selektiere mindestens eine Zeile mit gültiger Payment-ID.';
        return;
      }

      if (shouldSendEmails() && getEmailRecipientMode() === 'advisor') {
        const confirmed = window.confirm('Die E-Mails werden an die jeweiligen Beraterinnen gesendet. Möchtest du fortfahren?');
        if (!confirmed) {
          status.textContent = 'Export abgebrochen.';
          return;
        }
      }

      const createdFiles = [];
      const failed = [];

      for (let i = 0; i < paymentIds.length; i++) {
        const paymentId = paymentIds[i];
        status.textContent = `Erzeuge Rechnungsdetails-PDF ${i + 1}/${paymentIds.length} für Payment-ID ${paymentId} ...`;
        try {
          const data = await apiPost('/api/provisionen-goaffpro/invoice-details-pdf', {
            paymentId,
            pdfExportPath: input ? input.value : ''
          });
          if (input && data.pdfExportPath) input.value = data.pdfExportPath;
          if (data.file) createdFiles.push(data.file);
          if (data.jsonFile) createdFiles.push(data.jsonFile);
        } catch (error) {
          failed.push({ paymentId, message: error.message });
        }
      }

      if (filesBox) {
        const okHtml = createdFiles.length > 0
          ? `<strong>Exportierte Rechnungsdetails-PDFs:</strong><br>${createdFiles.map(f => `<code>${f}</code>`).join('<br>')}`
          : '<strong>Keine Rechnungsdetails-PDF erstellt.</strong>';
        const failHtml = failed.length > 0
          ? `<br><br><strong>Fehler:</strong><br>${failed.map(f => `<code>${f.paymentId}</code>: ${f.message}`).join('<br>')}`
          : '';
        filesBox.innerHTML = `${okHtml}${failHtml}`;
      }

      if (failed.length === 0) {
        status.textContent = `${createdFiles.length} Rechnungsdetails-PDF(s) erstellt.`;
      } else if (createdFiles.length === 0) {
        status.textContent = `Keine Rechnungsdetails-PDF erstellt. Fehler bei ${failed.length} Payment-ID(s).`;
      } else {
        status.textContent = `${createdFiles.length} Rechnungsdetails-PDF(s) erstellt, ${failed.length} Fehler.`;
      }
    }

    function drawBarChart(canvasId, labels, values, barColor) {
      const canvas = document.getElementById(canvasId);
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      if (!ctx) return;

      const width = canvas.width;
      const height = canvas.height;
      ctx.clearRect(0, 0, width, height);
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, width, height);

      if (!labels || labels.length === 0) {
        ctx.fillStyle = '#6b7280';
        ctx.font = '14px Arial';
        ctx.fillText('Keine Daten', 20, 30);
        return;
      }

      const maxValue = Math.max(...values, 1);
      const left = 40, top = 20, chartW = width - 60, chartH = height - 60;
      const barW = Math.max(16, Math.floor(chartW / labels.length) - 10);

      ctx.strokeStyle = '#d1d5db';
      ctx.beginPath();
      ctx.moveTo(left, top + chartH);
      ctx.lineTo(left + chartW, top + chartH);
      ctx.stroke();

      labels.forEach((label, i) => {
        const val = values[i] || 0;
        const h = Math.round((val / maxValue) * (chartH - 10));
        const x = left + i * (barW + 10) + 4;
        const y = top + chartH - h;

        ctx.fillStyle = barColor;
        ctx.fillRect(x, y, barW, h);

        ctx.fillStyle = '#111827';
        ctx.font = '11px Arial';
        const shortLabel = label.length > 16 ? label.slice(0, 16) + '…' : label;
        ctx.fillText(shortLabel, x, top + chartH + 14);
        ctx.fillText(String(Math.round(val * 100) / 100), x, y - 4);
      });
    }

    function renderAnalytics(data) {
      const summaryBody = document.getElementById('analyticsSummaryBody');
      const advisorBody = document.getElementById('analyticsAdvisorBody');
      const leaderBody = document.getElementById('analyticsLeaderBody');
      const countryBody = document.getElementById('analyticsCountryBody');
      const pendingBody = document.getElementById('analyticsPendingBody');
      const trafficBody = document.getElementById('analyticsTrafficBody');
      const orderStatusBody = document.getElementById('analyticsOrderStatusBody');
      const rewardStatusBody = document.getElementById('analyticsRewardStatusBody');
      if (!summaryBody || !advisorBody || !leaderBody || !countryBody || !pendingBody || !trafficBody || !orderStatusBody || !rewardStatusBody) return;

      const summary = data.summary || {};
      const summaryRows = [
        ['Zahllauf', summary.sinceId || ''],
        ['Anzahl Zahlläufe', summary.paymentsCount || 0],
        ['Gesamtbetrag', formatEuroAmount(summary.totalAmount || 0)],
        ['Anzahl Transaktionen', summary.totalTransactions || 0],
        ['Beraterinnen gesamt', summary.advisorCount || 0],
        ['Eigenprovision gesamt', formatEuroAmount(summary.selfCommission || 0)],
        ['Teamprovision gesamt', formatEuroAmount(summary.teamCommission || 0)],
        ['Offene Auszahlungen gesamt', formatEuroAmount(summary.pendingDueTotal || 0)],
        ['Reward-Betrag gesamt', formatEuroAmount(summary.rewardAmountTotal || 0)],
        ['Traffic-Quellen (Top)', summary.trafficSources || 0]
      ];
      summaryBody.innerHTML = summaryRows.map(r => { const numeric = Number(String(r[1]).replace(/[^0-9,.-]/g, '').replace(',', '.')); const val = Number.isFinite(numeric) ? countHoverHtml(r[1], `${r[0]}: ${r[1]}`) : escapeHtml(String(r[1])); return `<tr><td>${r[0]}</td><td>${val}</td></tr>`; }).join('');

      const advisors = Array.isArray(data.advisorRows) ? data.advisorRows : [];
      advisorBody.innerHTML = advisors.map(r =>
        `<tr><td>${r.advisorName || ''}</td><td>${r.affiliateId || ''}</td><td>${r.country || ''}</td><td>${countHoverHtml(r.paymentCount || 0, `Beraterin ${r.advisorName || ''} (${r.affiliateId || '-'}) hat ${r.paymentCount || 0} Zahlläufe`)}</td><td>${countHoverHtml(r.totalTransactions || 0, `Beraterin ${r.advisorName || ''} hat ${r.totalTransactions || 0} Transaktionen`)}</td><td>${formatEuroAmount(r.selfCommission || 0)}</td><td>${formatEuroAmount(r.teamCommission || 0)}</td><td>${formatEuroAmount(r.totalAmount || 0)}</td></tr>`
      ).join('');

      const leaders = Array.isArray(data.leaderRows) ? data.leaderRows : [];
      leaderBody.innerHTML = leaders.map(r =>
        `<tr><td>${r.leaderName || ''}</td><td>${r.leaderId || ''}</td><td>${countHoverHtml(r.advisorCount || 0, `Führungskraft ${r.leaderName || ''} hat ${r.advisorCount || 0} Beraterinnen im Team`)}</td><td>${countHoverHtml(r.paymentCount || 0, `Team von ${r.leaderName || ''} hat ${r.paymentCount || 0} Zahlläufe`)}</td><td>${formatEuroAmount(r.teamTotalAmount || 0)}</td><td>${formatEuroAmount(r.teamSelfCommission || 0)}</td><td>${formatEuroAmount(r.teamTeamCommission || 0)}</td></tr>`
      ).join('');

      const countries = Array.isArray(data.countryRows) ? data.countryRows : [];
      countryBody.innerHTML = countries.map(r => {
        const topAdvisors = advisors.filter(a => (a.country || '') === (r.country || '')).sort((a,b) => (b.paymentCount || 0) - (a.paymentCount || 0)).slice(0, 5);
        const tip = topAdvisors.length > 0
          ? `Top Beraterinnen in ${r.country || ''}: ` + topAdvisors.map(a => `${a.advisorName || a.affiliateId}: ${a.paymentCount || 0}`).join(', ')
          : `Keine Beraterinnen-Details für ${r.country || ''}`;
        return `<tr><td>${r.country || ''}</td><td>${countHoverHtml(r.payments || 0, tip)}</td></tr>`;
      }).join('');

      const pending = Array.isArray(data.pendingRows) ? data.pendingRows : [];
      pendingBody.innerHTML = pending.map(r => `<tr><td>${r.name || ''}</td><td>${r.affiliateId || ''}</td><td>${formatEuroAmount(r.due || 0)}</td><td>${formatEuroAmount(r.total || 0)}</td><td>${formatEuroAmount(r.paidOut || 0)}</td></tr>`).join('');

      const traffic = Array.isArray(data.trafficSourceRows) ? data.trafficSourceRows : [];
      trafficBody.innerHTML = traffic.map(r => `<tr><td>${r.source || ''}</td><td>${countHoverHtml(r.visits || 0, `Quelle ${r.source || ''}: ${r.visits || 0} Besuche`)}</td><td>${countHoverHtml(r.pageViews || 0, `Quelle ${r.source || ''}: ${r.pageViews || 0} Seitenaufrufe`)}</td></tr>`).join('');

      const orderStatuses = Array.isArray(data.orderStatusRows) ? data.orderStatusRows : [];
      orderStatusBody.innerHTML = orderStatuses.map(r => `<tr><td>${r.status || ''}</td><td>${countHoverHtml(r.count || 0, `Bestellstatus ${r.status || ''}: ${r.count || 0}`)}</td></tr>`).join('');

      const rewardStatuses = Array.isArray(data.rewardStatusRows) ? data.rewardStatusRows : [];
      rewardStatusBody.innerHTML = rewardStatuses.map(r => `<tr><td>${r.status || ''}</td><td>${countHoverHtml(r.count || 0, `Reward-Status ${r.status || ''}: ${r.count || 0}`)}</td><td>${formatEuroAmount(r.amount || 0)}</td></tr>`).join('');

      const chart = data.chartData || {};
      drawBarChart('analyticsAmountChart', chart.labels || [], chart.amountSeries || [], '#2563eb');
      drawBarChart('analyticsTxChart', chart.labels || [], chart.txSeries || [], '#10b981');
      drawBarChart('analyticsCountryChart', countries.map(r => r.country || 'Unbekannt'), countries.map(r => Number(r.payments || 0)), '#7c3aed');
      updateEmptyTablesVisibility(document);
    }

    function wireAnalyticsDateRange() {
      const fromDateInput = document.getElementById('analyticsFromDate');
      const toDateInput = document.getElementById('analyticsToDate');
      if (!fromDateInput || !toDateInput) return;

      const normalize = () => {
        if (fromDateInput.value && !toDateInput.value) toDateInput.value = fromDateInput.value;
        if (toDateInput.value && !fromDateInput.value) fromDateInput.value = toDateInput.value;
        if (fromDateInput.value && toDateInput.value && fromDateInput.value > toDateInput.value) {
          toDateInput.value = fromDateInput.value;
        }
      };

      const trigger = () => {
        normalize();
        fetchAnalyticsData();
      };

      fromDateInput.addEventListener('focus', () => {
        if (!fromDateInput.value && toDateInput.value) fromDateInput.value = toDateInput.value;
      });
      toDateInput.addEventListener('focus', () => {
        if (!toDateInput.value && fromDateInput.value) toDateInput.value = fromDateInput.value;
      });

      fromDateInput.addEventListener('change', trigger);
      toDateInput.addEventListener('change', trigger);
    }

    async function fetchAnalyticsData() {
      const status = document.getElementById('analyticsStatus');
      const select = document.getElementById('analyticsSinceSelect');
      const fromDateInput = document.getElementById('analyticsFromDate');
      const toDateInput = document.getElementById('analyticsToDate');
      if (!status || !select) return;
      try {
        status.textContent = 'Lade Auswertungsdaten...';
        const data = await apiPost('/api/analytics/fetch', {
          sinceId: select.value || '0',
          fromDate: fromDateInput ? fromDateInput.value : '',
          toDate: toDateInput ? toDateInput.value : ''
        });
        renderAnalytics(data);
        const count = (data.summary && data.summary.paymentsCount) || 0;
        status.textContent = `Auswertung geladen (${count} Zahlläufe).`;
      } catch (error) {
        status.textContent = `Fehler beim Laden der Auswertung: ${error.message}`;
      }
    }

    async function pollOnce() {
      const status = document.getElementById('pollStatus');
      try {
        const sinceSelect = document.getElementById('lastImportedSelect');
        const data = await apiPost('/api/provisionen-goaffpro/poll', { sinceId: sinceSelect ? (sinceSelect.value || '0') : '0' });
        if (Array.isArray(data.payments) && data.payments.length > 0) {
          data.payments.forEach(payment => {
            const key = rowKey(payment);
            if (!tableState.rows.find(x => rowKey(x) === key)) tableState.rows.push(payment);
          });
          renderTable();
        }
        updateCommissionSelect(data.lastImportedComissionHistory, data.lastImportedComission, data.commissionHistoryLabels);
        renderCommissionHistoryEditor(data.lastImportedComissionHistory, data.commissionHistoryLabels);
        status.textContent = data.message || 'Polling erfolgreich.';
      } catch (error) {
        status.textContent = `Fehler beim Polling: ${error.message}`;
      }
    }

    async function togglePolling() {
      const status = document.getElementById('pollStatus');
      if (pollIntervalId) {
        window.clearInterval(pollIntervalId);
        pollIntervalId = null;
        setPollingButtonState(false);
        status.textContent = 'Polling gestoppt.';
        return;
      }

      tableState.rows = [];
      tableState.selected = new Set();
      renderTable();
      setPollingButtonState(true);
      status.textContent = 'Polling läuft...';
      await pollOnce();
      pollIntervalId = window.setInterval(pollOnce, 60000);
    }

    async function pickFolder() {
      const input = document.getElementById('pdfExportPath');
      const hiddenPicker = document.getElementById('folderPickerInput');
      if (!input) return;

      if (window.showDirectoryPicker) {
        try {
          const handle = await window.showDirectoryPicker();
          if (handle && handle.name) {
            const guess = input.value || '';
            const base = guess.includes('\\') ? guess.substring(0, Math.max(0, guess.lastIndexOf('\\'))) : '';
            input.value = base ? `${base}\\${handle.name}` : handle.name;
          }
          return;
        } catch (_) {}
      }

      if (hiddenPicker) {
        hiddenPicker.click();
      }
    }

    function wireFolderPickerFallback() {
      const hiddenPicker = document.getElementById('folderPickerInput');
      const input = document.getElementById('pdfExportPath');
      if (!hiddenPicker || !input) return;

      hiddenPicker.addEventListener('change', (e) => {
        const file = e.target.files && e.target.files[0];
        if (!file || !file.webkitRelativePath) return;
        const topFolder = file.webkitRelativePath.split('/')[0];
        const current = input.value || '';
        const base = current.includes('\\') ? current.substring(0, Math.max(0, current.lastIndexOf('\\'))) : '';
        input.value = base ? `${base}\\${topFolder}` : topFolder;
      });
    }

    async function init() {
      try {
        const executables = await fetchExecutables();
        if (!Array.isArray(executables) || executables.length === 0) {
          document.getElementById('panels').innerHTML = '<p>Keine ausführbaren Java-Dateien gefunden.</p>';
          return;
        }

        const mainExecutable = executables.find(exe => exe.name === 'MainProvisionenGoaffpro');
        if (!mainExecutable) {
          document.getElementById('panels').innerHTML = '<p>MainProvisionenGoaffpro konnte nicht gefunden werden.</p>';
          return;
        }
        createTabAndPanel({ ...mainExecutable, displayName: 'Rechnungsservice' }, true);
        createValidationTabAndPanel();
        createAnalyticsTabAndPanel();
        createHelpTabAndPanel();
        const helpTab = document.querySelector('.tab[data-target="help-panel"]');
        if (helpTab) helpTab.style.marginLeft = 'auto';
        wireTabSwitching();
        await loadVersion();
        await loadHelpDocumentation();
        wireVersionPopup();

        const pollingBtn = document.getElementById('togglePollingBtn');
        const saveBtn = document.getElementById('saveSettingsBtn');
        const emailDesignerSaveBtn = document.getElementById('emailDesignerSaveBtn');
        const pickBtn = document.getElementById('pickFolderBtn');
        const exportInvoiceDetailsBtn = document.getElementById('exportInvoiceDetailsBtn');
        const addLatestCommissionBtn = document.getElementById('addLatestCommissionBtn');
        const rebuildCommissionHistoryBtn = document.getElementById('rebuildCommissionHistoryBtn');
        const fetchAnalyticsBtn = document.getElementById('fetchAnalyticsBtn');
        const loadValidationBtn = document.getElementById('loadValidationBtn');
        const loadValidationTreeBtn = document.getElementById('loadValidationTreeBtn');
        const expandAllTreeBtn = document.getElementById('expandAllTreeBtn');
        const collapseAllTreeBtn = document.getElementById('collapseAllTreeBtn');
        if (pollingBtn) pollingBtn.addEventListener('click', togglePolling);
        if (saveBtn) saveBtn.addEventListener('click', saveSettings);
        if (emailDesignerSaveBtn) emailDesignerSaveBtn.addEventListener('click', saveSettings);
        if (pickBtn) pickBtn.addEventListener('click', pickFolder);
        if (exportInvoiceDetailsBtn) exportInvoiceDetailsBtn.addEventListener('click', exportSelectedInvoiceDetailsPdfs);
        if (addLatestCommissionBtn) addLatestCommissionBtn.addEventListener('click', addLatestCommission);
        if (rebuildCommissionHistoryBtn) rebuildCommissionHistoryBtn.addEventListener('click', rebuildCommissionHistoryFromPayments);
        if (fetchAnalyticsBtn) fetchAnalyticsBtn.addEventListener('click', fetchAnalyticsData);
        if (loadValidationBtn) loadValidationBtn.addEventListener('click', loadValidationData);
        if (loadValidationTreeBtn) loadValidationTreeBtn.addEventListener('click', loadValidationTreeData);
        if (expandAllTreeBtn) expandAllTreeBtn.addEventListener('click', expandAllValidationTree);
        if (collapseAllTreeBtn) collapseAllTreeBtn.addEventListener('click', collapseAllValidationTree);

        const emailRecipientContactInput = document.getElementById('emailRecipientContact');
        const emailRecipientAdvisorInput = document.getElementById('emailRecipientAdvisor');
        const sendEmailsEnabledInput = document.getElementById('sendEmailsEnabled');
        if (emailRecipientContactInput) emailRecipientContactInput.addEventListener('change', applyAdvisorRecipientUiState);
        if (emailRecipientAdvisorInput) emailRecipientAdvisorInput.addEventListener('change', applyAdvisorRecipientUiState);
        if (sendEmailsEnabledInput) sendEmailsEnabledInput.addEventListener('change', applyAdvisorRecipientUiState);

        wireSettingsDirtyTracking();
        wireFolderPickerFallback();
        wireMainSectionTabs();
        wireEmailDesignerTabs();
        wireValidationSubtabs();
        wireTableInteractions();
        ensureResizableColumns();
        wireEmailTemplateEditor();
        wireSortingAndFiltering();
        wireAnalyticsDateRange();
        renderTable();
        setPollingButtonState(false);
        await loadSettings();
        updateEmptyTablesVisibility(document);
      } catch (error) {
        document.getElementById('panels').innerHTML = `<p>Fehler: ${error.message}</p>`;
      }
    }

    init();
  </script>
</body>
</html>
